name: Map

on:
  workflow_dispatch:
    inputs:
      target_date_range:
        description: 'Target date range (e.g. "May 26 - June 2"). Leave empty for latest week.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  map:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATA_REPO_PAT: ${{ secrets.DATA_REPO_PAT }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Gemini mapping
        uses: ./.github/actions/map
        with:
          target_date_range: ${{ github.event.inputs.target_date_range }}

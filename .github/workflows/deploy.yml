name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATA_REPO_PAT: ${{ secrets.DATA_REPO_PAT }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build frontend
        uses: Surxe/WRFrontiers-Discount-Visualizer/.github/actions/build@main

      - name: Upload Pages artifact
        uses: ./.github/actions/deploy

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: publish
        uses: actions/deploy-pages@v4

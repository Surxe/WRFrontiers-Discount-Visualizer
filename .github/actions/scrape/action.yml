name: Scrape and build game data
description: Scrape a news article and build game_data.json (steps 1–2)

inputs:
  news_url:
    description: War Robots Frontiers news article URL
    required: true
  commit:
    description: Commit and push scraped outputs
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      shell: bash
      run: pip install -r src/backend/requirements.txt

    - name: Run Step 1 (Scrape)
      shell: bash
      run: python -c "import sys; sys.path.append('src/backend'); from step1_scrape import run_step; run_step('${{ inputs.news_url }}')"

    - name: Run Step 2 (Build Game Data)
      shell: bash
      run: python -c "import sys; sys.path.append('src/backend'); from step2_build_game_data import run_step; run_step()"

    - name: Commit and push changes
      if: inputs.commit == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(data): update scraped news page and game data [skip ci]'
        file_pattern: 'src/backend/prompt/scraped_news_page.txt src/backend/prompt/game_data.json'

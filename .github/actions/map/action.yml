name: Local mapping
description: Map discounts with fuzzy matching and write frontend JSON (steps 1–3)

inputs:
  target_date_range:
    description: Target date range (e.g. "06-16 06-23").
    required: true
    default: ''
  items:
    description: Plain list of item names to map.
    required: true
    default: ''
  commit:
    description: Commit and push mapped discount JSON
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Checkout Data Repo
      uses: actions/checkout@v4
      with:
        repository: Surxe/WRFrontiersDB-Data
        token: ${{ env.DATA_REPO_PAT }}
        path: WRFrontiersDB-Data
        ref: main

    - name: Install Python dependencies
      shell: bash
      run: pip install -r src/backend/requirements.txt

    - name: Run Orchestrator Pipeline
      shell: bash
      run: python src/backend/run.py --items "${{ inputs.items }}" --date-range "${{ inputs.target_date_range }}"

    - name: Commit and push changes
      if: inputs.commit == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(data): update mapped discounts [skip ci]'
        file_pattern: 'archive/discounts/*.json src/frontend/public/data/** src/backend/game_data/game_data.json src/backend/manual_mapping.json'

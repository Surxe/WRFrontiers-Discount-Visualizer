name: Gemini mapping
description: Map discounts with Gemini and write frontend JSON (steps 3–4)

inputs:
  target_date_range:
    description: Target date range (e.g. "May 26 - June 2"). Leave empty for latest week.
    required: false
    default: ''
  commit:
    description: Commit and push mapped discount JSON
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Checkout Data Repo
      uses: actions/checkout@v4
      with:
        repository: Surxe/WRFrontiersDB-Data
        token: ${{ env.DATA_REPO_PAT }}
        path: WRFrontiersDB-Data
        ref: main

    - name: Install Python dependencies
      shell: bash
      run: pip install -r src/backend/requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Gemini CLI
      shell: bash
      run: npm install -g @google/gemini-cli

    - name: Run Step 3 (Call Gemini)
      shell: bash
      env:
        GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
      run: python -c "import sys; sys.path.append('src/backend'); from step3_call_gemini import run_step; run_step('${{ inputs.target_date_range }}')"

    - name: Run Step 4 (Archive and Generate Grid)
      shell: bash
      run: python -c "import sys; sys.path.append('src/backend'); from step4_archive_gen_grid import run_step; run_step()"

    - name: Commit and push changes
      if: inputs.commit == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(data): update mapped discounts [skip ci]'
        file_pattern: 'src/frontend/public/data/*.json'
